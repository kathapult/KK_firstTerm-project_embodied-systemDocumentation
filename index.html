<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mein Projekt</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
</head>
<body class="markdown-body" style="max-width:800px;margin:auto;padding:2rem">
  <div id="content"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('embodiedSystems_documentation.md')
      .then(r => r.text())
      .then(text => document.getElementById('content').innerHTML = marked.parse(text));
  </script>
</body>
</html>
